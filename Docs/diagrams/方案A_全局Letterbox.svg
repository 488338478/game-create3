<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <pattern id="gameBg" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="25" fill="#87CEEB"/><rect y="25" width="40" height="15" fill="#5DA04E"/>
    </pattern>
    <marker id="arrowUp" markerWidth="8" markerHeight="6" refX="4" refY="0" orient="auto">
      <path d="M0,6 L4,0 L8,6" fill="#E74C3C"/>
    </marker>
    <marker id="arrowDown" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
      <path d="M0,0 L4,6 L8,0" fill="#E74C3C"/>
    </marker>
    <marker id="arrowRight" markerWidth="6" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L6,4 L0,8" fill="#E74C3C"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="#2C2C2C"/>

  <!-- Monitor frame -->
  <rect x="60" y="30" width="840" height="480" rx="6" fill="#1A1A1A" stroke="#555" stroke-width="2"/>

  <!-- 16:10 实际分辨率标注 -->
  <text x="480" y="22" text-anchor="middle" fill="#888" font-size="14">屏幕 1920×1200 (16:10)</text>

  <!-- Letterbox black bars (top) -->
  <rect x="60" y="30" width="840" height="50" fill="#000"/>
  <!-- Letterbox black bars (bottom) -->
  <rect x="60" y="460" width="840" height="50" fill="#000"/>

  <!-- Game area (16:9 within 16:10) -->
  <rect x="60" y="80" width="840" height="380" fill="url(#gameBg)" opacity="0.9"/>
  <rect x="60" y="80" width="840" height="380" fill="none" stroke="#E74C3C" stroke-width="2.5" stroke-dasharray="12,6"/>

  <!-- Game content hints -->
  <rect x="200" y="200" width="80" height="60" rx="4" fill="#F39C12" opacity="0.8"/>
  <circle cx="600" cy="280" r="30" fill="#3498DB" opacity="0.7"/>
  <rect x="500" y="350" width="120" height="15" rx="3" fill="#8B4513" opacity="0.6"/>

  <!-- Annotation: Game area -->
  <line x1="500" y1="80" x2="500" y2="55" stroke="#E74C3C" stroke-width="1.5"/>
  <text x="500" y="50" text-anchor="middle" fill="#E74C3C" font-size="16" font-weight="bold">16:9 游戏区域 (1920×1080)</text>

  <!-- Annotation: Top black bar -->
  <line x1="140" y1="55" x2="140" y2="45" stroke="#FFF" stroke-width="1.5"/>
  <text x="140" y="42" text-anchor="middle" fill="#FFF" font-size="13">▲ 黑边 Letterbox (60px)</text>

  <!-- Annotation: Bottom black bar -->
  <line x1="140" y1="485" x2="140" y2="498" stroke="#FFF" stroke-width="1.5"/>
  <text x="140" y="510" text-anchor="middle" fill="#FFF" font-size="13">▼ 黑边 Letterbox (60px)</text>

  <!-- Result label -->
  <rect x="320" y="500" width="320" height="30" rx="4" fill="#27AE60"/>
  <text x="480" y="520" text-anchor="middle" fill="#FFF" font-size="14" font-weight="bold">游戏内容完全不受影响，所有场景安全</text>
</svg>
