<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <pattern id="gameBgB" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <rect width="30" height="18" fill="#87CEEB"/><rect y="18" width="30" height="12" fill="#5DA04E"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="960" height="600" fill="#1E1E2E"/>

  <!-- === Top: 16:9 scenario === -->
  <text x="480" y="28" text-anchor="middle" fill="#888" font-size="15">16:9 屏幕 (1920×1080)</text>

  <rect x="80" y="42" width="800" height="220" rx="6" fill="#1A1A1A" stroke="#555" stroke-width="1.5"/>

  <!-- Left: Game world 50% -->
  <rect x="80" y="42" width="400" height="220" fill="url(#gameBgB)" opacity="0.8"/>
  <text x="280" y="158" text-anchor="middle" fill="#FFF" font-size="18" font-weight="bold">🎮 游戏世界</text>
  <text x="280" y="182" text-anchor="middle" fill="#FFF" font-size="13" opacity="0.7">960px · 50%</text>

  <!-- Right: UI Panel 50% -->
  <rect x="480" y="42" width="400" height="220" fill="#2C3E50"/>
  <text x="680" y="158" text-anchor="middle" fill="#BDC3C7" font-size="18" font-weight="bold">📋 UI 面板</text>
  <text x="680" y="182" text-anchor="middle" fill="#BDC3C7" font-size="13" opacity="0.7">960px · 50%</text>

  <!-- Split line -->
  <line x1="480" y1="42" x2="480" y2="262" stroke="#E74C3C" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="480" y="280" text-anchor="middle" fill="#E74C3C" font-size="12">分割线 0.5</text>

  <!-- Arrow down to 16:10 -->
  <path d="M480,290 L480,320" stroke="#F39C12" stroke-width="3" marker-end="url(#arrowDownB)"/>
  <defs><marker id="arrowDownB" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto"><path d="M0,0 L4,6 L8,0" fill="#F39C12"/></marker></defs>

  <!-- === Bottom: 16:10 scenario === -->
  <text x="480" y="338" text-anchor="middle" fill="#F39C12" font-size="15" font-weight="bold">16:10 屏幕 (1920×1200) — 动态调整后</text>

  <rect x="80" y="352" width="800" height="220" rx="6" fill="#1A1A1A" stroke="#555" stroke-width="1.5"/>

  <!-- Left: Game world ~55.6% -->
  <rect x="80" y="352" width="445" height="220" fill="url(#gameBgB)" opacity="0.8"/>
  <text x="302" y="468" text-anchor="middle" fill="#FFF" font-size="18" font-weight="bold">🎮 游戏世界</text>
  <text x="302" y="492" text-anchor="middle" fill="#FFF" font-size="13" opacity="0.7">~1068px · 55.6%</text>
  <text x="302" y="510" text-anchor="middle" fill="#27AE60" font-size="11">← 加宽以保持可玩宽高比</text>

  <!-- Right: UI Panel ~44.4% -->
  <rect x="525" y="352" width="355" height="220" fill="#2C3E50"/>
  <text x="702" y="468" text-anchor="middle" fill="#BDC3C7" font-size="18" font-weight="bold">📋 UI 面板</text>
  <text x="702" y="492" text-anchor="middle" fill="#BDC3C7" font-size="13" opacity="0.7">~852px · 44.4%</text>
  <text x="702" y="510" text-anchor="middle" fill="#E67E22" font-size="11">← 缩窄但仍可容纳内容</text>

  <!-- Split line -->
  <line x1="525" y1="352" x2="525" y2="572" stroke="#27AE60" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="525" y="590" text-anchor="middle" fill="#27AE60" font-size="12" font-weight="bold">动态分割线 ~0.556</text>

  <!-- Key formula -->
  <rect x="200" y="575" width="560" height="20" rx="4" fill="transparent"/>
  <text x="480" y="595" text-anchor="middle" fill="#888" font-size="11">splitRatio = max(0.5, minGameAspect / currentAspect) = max(0.5, 0.889/1.6) ≈ 0.556</text>
</svg>
