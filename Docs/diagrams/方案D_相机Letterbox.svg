<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <pattern id="gameBgD" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <rect width="30" height="18" fill="#87CEEB"/><rect y="18" width="30" height="12" fill="#5DA04E"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="#1A1A2E"/>

  <!-- Screen label -->
  <text x="480" y="24" text-anchor="middle" fill="#888" font-size="14">屏幕 1920×1200 (16:10) — DualWorld 模式</text>

  <!-- Monitor outer frame -->
  <rect x="40" y="36" width="880" height="475" rx="6" fill="#111" stroke="#444" stroke-width="1.5"/>

  <!-- ===== LEFT HALF: Game world (camera viewport) ===== -->
  <!-- Camera background color fill (fills left half) -->
  <rect x="40" y="36" width="440" height="475" fill="#5BA0C8"/>

  <!-- Camera viewport letterbox area (centered 16:9 within the half) -->
  <!-- Left half is 440×475. To keep 16:9 ratio within this: 440/(16/9)=247.5, so height=247.5, letterbox=113.75 top/bottom -->
  <rect x="40" y="150" width="440" height="248" fill="url(#gameBgD)" opacity="0.9"/>

  <!-- Top camera letterbox bar -->
  <rect x="40" y="36" width="440" height="114" fill="#1A1A2E" opacity="0.7"/>
  <!-- Bottom camera letterbox bar -->
  <rect x="40" y="398" width="440" height="113" fill="#1A1A2E" opacity="0.7"/>

  <!-- Game content hints -->
  <rect x="150" y="240" width="60" height="40" rx="3" fill="#F39C12" opacity="0.7"/>
  <circle cx="320" cy="290" r="20" fill="#3498DB" opacity="0.6"/>
  <rect x="260" y="330" width="90" height="10" rx="3" fill="#8B4513" opacity="0.5"/>

  <!-- Game viewport border -->
  <rect x="40" y="150" width="440" height="248" fill="none" stroke="#E74C3C" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- Annotations for game side -->
  <line x1="260" y1="150" x2="260" y2="128" stroke="#E74C3C" stroke-width="1"/>
  <text x="260" y="123" text-anchor="middle" fill="#E74C3C" font-size="12" font-weight="bold">相机 viewport</text>
  <text x="260" y="137" text-anchor="middle" fill="#E74C3C" font-size="10">保持 16:9 宽高比</text>

  <text x="100" y="98" fill="#888" font-size="11">▲ camera background</text>
  <text x="100" y="435" fill="#888" font-size="11">▼ camera background</text>

  <!-- Label: game world -->
  <text x="260" y="475" text-anchor="middle" fill="#FFF" font-size="15" font-weight="bold">🎮 游戏世界</text>
  <text x="260" y="495" text-anchor="middle" fill="#888" font-size="11">Camera.rect = (0, yOffset, 0.5, scale)</text>

  <!-- ===== SPLIT LINE ===== -->
  <line x1="480" y1="36" x2="480" y2="511" stroke="#E74C3C" stroke-width="2.5" stroke-dasharray="10,6"/>

  <!-- ===== RIGHT HALF: UI Panel ===== -->
  <rect x="480" y="36" width="440" height="475" fill="#2C3E50"/>

  <!-- UI Panel header -->
  <rect x="490" y="46" width="420" height="36" rx="3" fill="#34495E"/>
  <text x="700" y="68" text-anchor="middle" fill="#BDC3C7" font-size="13">现实 · 排版任务</text>

  <!-- UI content blocks -->
  <!-- Targets row -->
  <rect x="520" y="100" width="70" height="50" rx="4" fill="#F1C40F" opacity="0.4"/>
  <rect x="610" y="100" width="70" height="50" rx="4" fill="#F1C40F" opacity="0.4"/>
  <rect x="700" y="100" width="70" height="50" rx="4" fill="#F1C40F" opacity="0.4"/>

  <!-- Draggable blocks row -->
  <rect x="520" y="200" width="70" height="50" rx="4" fill="#E67E22" opacity="0.6"/>
  <rect x="610" y="200" width="70" height="50" rx="4" fill="#E67E22" opacity="0.6"/>
  <rect x="700" y="200" width="70" height="50" rx="4" fill="#E67E22" opacity="0.6"/>

  <!-- Submit button -->
  <rect x="620" y="290" width="120" height="36" rx="4" fill="#2980B9"/>
  <text x="680" y="313" text-anchor="middle" fill="#FFF" font-size="13">提交</text>

  <!-- Chat panel at bottom -->
  <rect x="490" y="360" width="420" height="100" rx="4" fill="#1A2530"/>
  <text x="700" y="385" text-anchor="middle" fill="#7F8C8D" font-size="11">NPC: "请把橙色方块拖到黄色槽位"</text>

  <!-- Right side annotation -->
  <line x1="920" y1="275" x2="940" y2="275" stroke="#27AE60" stroke-width="2"/>
  <text x="935" y="260" fill="#27AE60" font-size="12" font-weight="bold">UI Canvas</text>
  <text x="935" y="275" fill="#27AE60" font-size="10">撑满全高</text>
  <text x="935" y="290" fill="#27AE60" font-size="10">475px</text>

  <!-- Label: UI Panel -->
  <text x="700" y="505" text-anchor="middle" fill="#FFF" font-size="15" font-weight="bold">📋 现实 UI 面板</text>
  <text x="700" y="510" text-anchor="middle" fill="#888" font-size="11">RectTransform anchor = (0.5, 0) → (1, 1)，自然填满</text>

  <!-- Bottom principle bar -->
  <rect x="140" y="510" width="680" height="24" rx="4" fill="#27AE60" opacity="0.15"/>
  <text x="480" y="526" text-anchor="middle" fill="#27AE60" font-size="12" font-weight="bold">游戏世界不变形（玩家手感一致） · UI 面板自适应填充剩余空间</text>
</svg>
